name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build executable jar
        run: ./gradlew buildMainJar

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: LowYSwampHutForFixedSeedGUI
          path: build/libs/LowYSwampHutForFixedSeedGUI.jar
          if-no-files-found: error
